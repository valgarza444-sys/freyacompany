# Decap CMS configuration for Freya & Company
# Backend: Netlify Identity + Git Gateway (client logs in by email, no GitHub account needed).
# Enable both in Netlify: Site settings > Identity, and Identity > Services > Git Gateway.

backend:
  name: git-gateway
  branch: main

# Uploaded images are committed here and served from /images/uploads/...
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Editors work on a draft, then Publish. (Requires Netlify "Editorial Workflow" / PRs.)
publish_mode: editorial_workflow

site_url: https://example.com
display_url: https://example.com
logo_url: /favicon.svg

collections:
  - name: settings
    label: "Business Info & Settings"
    delete: false
    files:
      - name: site
        label: "Business Info"
        file: "src/data/site.json"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description (used for SEO)", name: "description", widget: "text" }
          - { label: "Website URL", name: "url", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Service Area", name: "serviceArea", widget: "string" }
          - { label: "Address", name: "address", widget: "string", required: false }
          - { label: "Hours", name: "hours", widget: "string", required: false }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram handle (no @)", name: "instagram", widget: "string", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - label: "Main Button (Call to Action)"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Button Label", name: "label", widget: "string" }
              - { label: "Button Link", name: "href", widget: "string" }

  - name: services
    label: "Services"
    label_singular: "Service"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary (short description)", name: "summary", widget: "text" }
      - { label: "Icon (a symbol, e.g. ❧ ✶ ○)", name: "icon", widget: "string", required: false }
      - { label: "Display Order", name: "order", widget: "number", default: 0, value_type: "int" }
      - { label: "Details", name: "body", widget: "markdown", required: false }

  - name: portfolio
    label: "Portfolio"
    label_singular: "Event"
    folder: "src/content/portfolio"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["order", "date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category (e.g. Wedding, Bridal Shower)", name: "category", widget: "string", required: false }
      - { label: "Date / Year", name: "date", widget: "string", required: false }
      - { label: "Cover Image", name: "cover", widget: "image" }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Feature on homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Display Order", name: "order", widget: "number", default: 0, value_type: "int" }
      - { label: "Description", name: "body", widget: "markdown", required: false }

  - name: pages
    label: "Pages"
    delete: false
    files:
      - name: about
        label: "About Page"
        file: "src/content/pages/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Intro (short italic line)", name: "intro", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
